name: Build Rekordbox Bridge

on:
  push:
    tags:
      - "rekordbox-bridge-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CSC_LINK: ${{ secrets.CSC_LINK }}
  CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rekordbox-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install notarization dependency
        run: npm install --save-dev @electron/notarize

      - name: Build TypeScript
        run: npm run build

      - name: Import signing certificate into keychain
        if: env.CSC_LINK != ''
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v "$KEYCHAIN_PATH"

          rm -f $RUNNER_TEMP/cert.p12

      - name: Package for macOS
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_LINK != '' && 'true' || 'false' }}

      - name: List build output
        run: ls -la out/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rekordbox-bridge-mac
          path: |
            rekordbox-agent/out/*.dmg
            rekordbox-agent/out/*.zip
            rekordbox-agent/out/*.pkg
          if-no-files-found: warn

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Rekordbox Bridge ${{ github.ref_name }}"
          body: |
            ## Rekordbox Bridge

            Download the installer for your Mac:

            | File | Description |
            |------|-------------|
            | `.pkg` | **Recommended** — double-click installer, installs to /Applications |
            | `.dmg` | Drag-to-Applications disk image |
            | `.zip` | Portable zip archive |

            ### First Launch
            1. Open the app from Applications
            2. Click the vinyl icon in your menu bar
            3. Enter your Event ID and Push Token from the Admin panel
            4. Set mode to Auto and you're live!

            ### Requirements
            - macOS 11+ (Apple Silicon or Intel)
            - Rekordbox 6/7 running in Performance mode
          files: |
            rekordbox-agent/out/*.dmg
            rekordbox-agent/out/*.zip
            rekordbox-agent/out/*.pkg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true
