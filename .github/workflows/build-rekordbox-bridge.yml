name: Build DJ Bridge

on:
  push:
    tags:
      - "dj-bridge-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CSC_LINK: ${{ secrets.CSC_LINK }}
  CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rekordbox-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (skip native compile)
        run: npm ci --ignore-scripts

      - name: Install notarization dependency
        run: npm install --save-dev @electron/notarize --ignore-scripts

      - name: Build TypeScript
        run: |
          cp src/main/preload.js dist/main/preload.js 2>/dev/null || true
          npx tsc
          rm -rf dist/renderer && cp -r src/renderer dist/renderer
          cp src/main/preload.js dist/main/preload.js
          node scripts/stamp-version.js

      - name: Import signing certificate into keychain
        if: env.CSC_LINK != ''
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > $RUNNER_TEMP/app_cert.p12
          security import $RUNNER_TEMP/app_cert.p12 -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v "$KEYCHAIN_PATH"

          rm -f $RUNNER_TEMP/app_cert.p12

      - name: Package & publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_LINK != '' && 'true' || 'false' }}

      - name: Package only (manual trigger)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_LINK != '' && 'true' || 'false' }}

      - name: Update release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#dj-bridge-v}"
          RELEASE_TAG="$TAG"
          gh release view "$RELEASE_TAG" > /dev/null 2>&1 || RELEASE_TAG="v${VERSION}"
          gh release edit "$RELEASE_TAG" --draft=false --title "DJ Bridge v${VERSION}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: ls -la out/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dj-bridge-mac
          path: |
            rekordbox-agent/out/*.dmg
            rekordbox-agent/out/*.zip
            rekordbox-agent/out/*.yml
            rekordbox-agent/out/*.yaml
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true
