name: Build Rekordbox Bridge

on:
  push:
    tags:
      - "rekordbox-bridge-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rekordbox-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install notarization dependency
        run: npm install --save-dev @electron/notarize

      - name: Build TypeScript
        run: npm run build

      - name: Import signing certificate
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "Certificate configured for code signing"

      - name: Package for macOS
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: List build output
        run: ls -la out/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rekordbox-bridge-mac
          path: |
            rekordbox-agent/out/*.dmg
            rekordbox-agent/out/*.zip
            rekordbox-agent/out/*.pkg
          if-no-files-found: warn

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Rekordbox Bridge ${{ github.ref_name }}"
          body: |
            ## Rekordbox Bridge

            Download the installer for your Mac:

            | File | Description |
            |------|-------------|
            | `.pkg` | **Recommended** — double-click installer, installs to /Applications |
            | `.dmg` | Drag-to-Applications disk image |
            | `.zip` | Portable zip archive |

            ### First Launch
            1. Open the app from Applications
            2. Click the vinyl icon in your menu bar
            3. Enter your Event ID and Push Token from the Admin panel
            4. Set mode to Auto and you're live!

            ### Requirements
            - macOS 11+ (Apple Silicon or Intel)
            - Rekordbox 6/7 running in Performance mode
          files: |
            rekordbox-agent/out/*.dmg
            rekordbox-agent/out/*.zip
            rekordbox-agent/out/*.pkg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
