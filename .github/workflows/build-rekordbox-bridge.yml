name: Build DJ Bridge

on:
  push:
    tags:
      - "dj-bridge-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CSC_LINK: ${{ secrets.CSC_LINK }}
  CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rekordbox-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install notarization dependency
        run: npm install --save-dev @electron/notarize

      - name: Build TypeScript
        run: npm run build

      - name: Import signing certificates into keychain
        if: env.CSC_LINK != ''
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > $RUNNER_TEMP/app_cert.p12
          security import $RUNNER_TEMP/app_cert.p12 -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm -f $RUNNER_TEMP/app_cert.p12

          if [ -n "$CSC_INSTALLER_LINK" ]; then
            echo "$CSC_INSTALLER_LINK" | base64 --decode > $RUNNER_TEMP/installer_cert.p12
            security import $RUNNER_TEMP/installer_cert.p12 -k "$KEYCHAIN_PATH" -P "$CSC_INSTALLER_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild -T /usr/bin/productsign
            rm -f $RUNNER_TEMP/installer_cert.p12
          fi

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "=== Signing identities ==="
          security find-identity -v "$KEYCHAIN_PATH"
        env:
          CSC_INSTALLER_LINK: ${{ secrets.CSC_INSTALLER_LINK }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.CSC_INSTALLER_KEY_PASSWORD }}

      - name: Package & publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_LINK != '' && 'true' || 'false' }}

      - name: Package only (manual trigger)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_LINK != '' && 'true' || 'false' }}

      - name: Sign and notarize PKG
        if: env.CSC_LINK != ''
        run: |
          PKG_FILE=$(ls out/*.pkg 2>/dev/null | head -1)
          if [ -z "$PKG_FILE" ]; then
            echo "No PKG found, skipping"
            exit 0
          fi

          echo "=== Re-signing PKG with Developer ID Installer ==="
          INSTALLER_ID=$(security find-identity -v -p basic $RUNNER_TEMP/build.keychain | grep "Developer ID Installer" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$INSTALLER_ID" ]; then
            echo "No Developer ID Installer identity found, skipping PKG signing"
            exit 0
          fi
          echo "Using identity: $INSTALLER_ID"

          SIGNED_PKG="${PKG_FILE%.pkg}-signed.pkg"
          productsign --sign "$INSTALLER_ID" --keychain $RUNNER_TEMP/build.keychain "$PKG_FILE" "$SIGNED_PKG"
          mv "$SIGNED_PKG" "$PKG_FILE"
          echo "PKG signed successfully"

          echo "=== Notarizing PKG ==="
          xcrun notarytool submit "$PKG_FILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m

          echo "=== Stapling notarization ticket ==="
          xcrun stapler staple "$PKG_FILE"
          echo "PKG notarized and stapled"

      - name: Re-upload signed PKG to release
        if: startsWith(github.ref, 'refs/tags/') && env.CSC_LINK != ''
        run: |
          PKG_FILE=$(ls out/*.pkg 2>/dev/null | head -1)
          if [ -z "$PKG_FILE" ]; then exit 0; fi

          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#dj-bridge-v}"
          RELEASE_TAG="$TAG"
          gh release view "$RELEASE_TAG" > /dev/null 2>&1 || RELEASE_TAG="v${VERSION}"

          PKG_NAME=$(basename "$PKG_FILE")
          UPLOAD_NAME=$(echo "$PKG_NAME" | sed 's/ /-/g')

          gh release delete-asset "$RELEASE_TAG" "$UPLOAD_NAME" --yes 2>/dev/null || true
          gh release upload "$RELEASE_TAG" "$PKG_FILE#$UPLOAD_NAME"
          echo "Uploaded signed+notarized PKG to release $RELEASE_TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#dj-bridge-v}"
          RELEASE_TAG="$TAG"
          gh release view "$RELEASE_TAG" > /dev/null 2>&1 || RELEASE_TAG="v${VERSION}"
          gh release edit "$RELEASE_TAG" --draft=false --title "DJ Bridge v${VERSION}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: ls -la out/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dj-bridge-mac
          path: |
            rekordbox-agent/out/*.dmg
            rekordbox-agent/out/*.zip
            rekordbox-agent/out/*.pkg
            rekordbox-agent/out/*.yml
            rekordbox-agent/out/*.yaml
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true
