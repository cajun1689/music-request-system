name: Deploy Frontend & Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "infrastructure/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    outputs:
      frontend-bucket: ${{ steps.outputs.outputs.bucket }}
      distribution-id: ${{ steps.outputs.outputs.distribution }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install infrastructure dependencies
        run: npm ci
        working-directory: infrastructure

      - name: CDK diff
        run: npx cdk diff 2>&1 || true
        working-directory: infrastructure
        env:
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_ENVIRONMENT: ${{ secrets.PAYPAL_ENVIRONMENT }}
          PAYPAL_WEBHOOK_ID: ${{ secrets.PAYPAL_WEBHOOK_ID }}

      - name: CDK deploy
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json
        working-directory: infrastructure
        env:
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_ENVIRONMENT: ${{ secrets.PAYPAL_ENVIRONMENT }}
          PAYPAL_WEBHOOK_ID: ${{ secrets.PAYPAL_WEBHOOK_ID }}

      - name: Extract stack outputs
        id: outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name InfrastructureStack \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text 2>/dev/null || echo "")
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?contains(@,'casperrequests.com')]].Id | [0]" --output text)
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "distribution=${DIST_ID}" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Determine S3 bucket
        id: bucket
        run: |
          BUCKET="${{ needs.deploy-infrastructure.outputs.frontend-bucket }}"
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            BUCKET=$(aws s3 ls | grep -o 'infrastructurestack-frontendbucket[^ ]*' | head -1)
          fi
          echo "name=${BUCKET}" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        run: aws s3 sync dist "s3://${{ steps.bucket.outputs.name }}" --delete
        working-directory: frontend

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ needs.deploy-infrastructure.outputs.distribution }}"
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi
