<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekordbox Bridge</title>
  <style>
    :root {
      --bg: #0c111b;
      --card: #151d2e;
      --card-border: #1e293b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --input-bg: #0f172a;
      --input-border: #334155;
      --input-focus: #3b82f6;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      -webkit-app-region: drag;
      user-select: none;
      overflow-y: auto;
      height: 100vh;
    }

    .titlebar {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.3px;
      -webkit-app-region: drag;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
    }

    .content {
      -webkit-app-region: no-drag;
      padding: 0 16px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge.connected { background: rgba(34,197,94,0.15); color: var(--green); }
    .status-badge.error { background: rgba(239,68,68,0.15); color: var(--red); }
    .status-badge.idle { background: rgba(234,179,8,0.15); color: var(--yellow); }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }

    .now-playing {
      background: var(--input-bg);
      border-radius: 8px;
      padding: 12px;
      margin-top: 8px;
    }
    .now-playing .track-title {
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
    }
    .now-playing .track-artist {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .now-playing .track-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .match-result {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .match-result.matched {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--green);
    }
    .match-result.no-match {
      background: rgba(234,179,8,0.1);
      border: 1px solid rgba(234,179,8,0.3);
      color: var(--yellow);
    }

    .info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      font-size: 12px;
    }
    .info-grid .label { color: var(--text-muted); }
    .info-grid .value { color: var(--text); font-weight: 500; }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 6px;
      padding: 8px 10px;
      margin-top: 8px;
      font-size: 11px;
      color: #fca5a5;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 4px;
      margin-top: 10px;
    }
    label:first-child { margin-top: 0; }

    input[type="text"], input[type="number"], input[type="password"], select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--input-focus); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 10px;
      margin-right: 6px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.secondary {
      background: var(--card-border);
      color: var(--text-dim);
    }
    .btn.secondary:hover { background: var(--input-border); }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .btn-row .btn { margin: 0; }

    .manual-fields {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .manual-fields input { flex: 1; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 12px;
    }
    .toggle-row .label-text { color: var(--text); font-weight: 500; }
    .toggle-row .sub-text { color: var(--text-muted); font-size: 11px; }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: var(--input-border);
      border-radius: 10px;
      transition: background 0.2s;
    }
    .toggle .slider::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: var(--accent);
    }
    .toggle input:checked + .slider::after {
      transform: translateX(16px);
    }

    .footer {
      text-align: center;
      padding: 4px 0 8px;
      font-size: 10px;
      color: var(--text-muted);
    }
    .footer a {
      color: var(--text-muted);
      text-decoration: underline;
      cursor: pointer;
    }
    .footer a:hover { color: var(--text-dim); }

    .section-divider {
      border: none;
      border-top: 1px solid var(--card-border);
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="titlebar">Rekordbox Bridge</div>

  <div class="content">
    <!-- Status Card -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Status</span>
        <span class="status-badge idle" id="status-badge">
          <span class="dot yellow" id="dot"></span>
          <span id="conn-label">Idle</span>
        </span>
      </div>

      <div class="info-grid">
        <span class="label">Mode</span>
        <span class="value" id="mode-label">Auto</span>
        <span class="label">Database</span>
        <span class="value" id="db-label" style="word-break:break-all; font-size:11px;">Not found</span>
        <span class="label">Queue</span>
        <span class="value" id="queue-label">0 pending</span>
      </div>

      <div id="now-playing" class="now-playing" style="display:none;">
        <div class="track-title" id="track-title"></div>
        <div class="track-artist" id="track-artist"></div>
        <div class="track-time" id="track-time"></div>
      </div>

      <div id="match-box" class="match-result matched" style="display:none;">
        <span id="match-label"></span>
      </div>

      <div id="error-box" class="error-banner" style="display:none;"></div>

      <div class="btn-row">
        <button class="btn secondary" id="btn-poll">Poll Now</button>
        <button class="btn secondary" id="btn-find-db">Detect DB</button>
      </div>
    </div>

    <!-- Configuration Card -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Configuration</span>
      </div>

      <label>API Base URL</label>
      <input type="text" id="cfg-api-url" placeholder="https://casperrequests.com/prod" />

      <label>Event ID</label>
      <input type="text" id="cfg-event-id" placeholder="gaslight-residency" />

      <label>Push Token</label>
      <input type="password" id="cfg-push-token" placeholder="Paste from Admin panel" />

      <label>SQLCipher Key <span style="font-weight:400; color:var(--text-muted);">(leave blank for unencrypted)</span></label>
      <input type="password" id="cfg-sqlcipher-key" placeholder="Optional" />

      <label>Polling Interval (ms)</label>
      <input type="number" id="cfg-interval" value="10000" min="3000" max="60000" step="1000" />

      <label>Mode</label>
      <select id="cfg-mode">
        <option value="auto">Auto — poll Rekordbox database</option>
        <option value="manual">Manual — type tracks to push</option>
      </select>

      <div class="btn-row">
        <button class="btn" id="btn-save-config">Save Configuration</button>
      </div>

      <hr class="section-divider" />

      <div class="toggle-row">
        <div>
          <div class="label-text">Launch at Login</div>
          <div class="sub-text">Start Rekordbox Bridge when you log in</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="chk-launch-login" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Manual Push Card -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Manual Push</span>
      </div>
      <p style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">
        Use when auto-polling isn't available. Type a track to push directly.
      </p>
      <div class="manual-fields">
        <input type="text" id="manual-title" placeholder="Song title" />
        <input type="text" id="manual-artist" placeholder="Artist" />
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-manual-push">Push Track</button>
      </div>
      <div id="manual-error" class="error-banner" style="display:none;"></div>
    </div>

    <div class="footer">
      <span id="version-label">v1.0.0</span> &middot;
      <a id="link-logs">Open Logs</a>
    </div>
  </div>

  <script>
    const bridge = window.bridge;
    const el = (id) => document.getElementById(id);

    function updateUI(s) {
      const dot = el("dot");
      const badge = el("status-badge");
      if (s.connected) {
        dot.className = "dot green";
        badge.className = "status-badge connected";
        el("conn-label").textContent = "Connected";
      } else if (s.error) {
        dot.className = "dot red";
        badge.className = "status-badge error";
        el("conn-label").textContent = "Error";
      } else {
        dot.className = "dot yellow";
        badge.className = "status-badge idle";
        el("conn-label").textContent = "Idle";
      }

      el("mode-label").textContent = s.mode === "auto" ? "Auto" : "Manual";
      el("db-label").textContent = s.dbPath || "Not found";
      el("queue-label").textContent = s.queueSize + " pending";

      if (s.lastTrack) {
        el("now-playing").style.display = "";
        el("track-title").textContent = s.lastTrack.title;
        el("track-artist").textContent = s.lastTrack.artist || "Unknown Artist";
        el("track-time").textContent = s.lastTrack.playedAt
          ? new Date(s.lastTrack.playedAt).toLocaleTimeString()
          : "";
      } else {
        el("now-playing").style.display = "none";
      }

      if (s.lastResult) {
        el("match-box").style.display = "";
        if (s.lastResult.matched) {
          el("match-box").className = "match-result matched";
          el("match-label").textContent =
            "✓ Matched request! Score: " + (s.lastResult.confidenceScore ?? 0);
        } else {
          el("match-box").className = "match-result no-match";
          el("match-label").textContent =
            "No match — " + (s.lastResult.reason || "no approved requests");
        }
      } else {
        el("match-box").style.display = "none";
      }

      if (s.error) {
        el("error-box").style.display = "";
        el("error-box").textContent = s.error;
      } else {
        el("error-box").style.display = "none";
      }

      if (s.version) {
        el("version-label").textContent = "v" + s.version;
      }

      if (s.launchAtLogin !== undefined) {
        el("chk-launch-login").checked = s.launchAtLogin;
      }
    }

    bridge.onStatusUpdate(updateUI);

    async function loadConfig() {
      const c = await bridge.getConfig();
      el("cfg-api-url").value = c.apiBaseUrl || "";
      el("cfg-event-id").value = c.eventId || "";
      el("cfg-push-token").value = c.pushToken || "";
      el("cfg-sqlcipher-key").value = c.sqlcipherKey || "";
      el("cfg-interval").value = c.pollingIntervalMs || 10000;
      el("cfg-mode").value = c.mode || "auto";
    }

    async function loadStatus() {
      const s = await bridge.getStatus();
      updateUI(s);
    }

    el("btn-save-config").addEventListener("click", async () => {
      el("btn-save-config").disabled = true;
      el("btn-save-config").textContent = "Saving…";
      try {
        await bridge.setConfig({
          apiBaseUrl: el("cfg-api-url").value.trim(),
          eventId: el("cfg-event-id").value.trim(),
          pushToken: el("cfg-push-token").value.trim(),
          sqlcipherKey: el("cfg-sqlcipher-key").value.trim(),
          pollingIntervalMs: parseInt(el("cfg-interval").value, 10) || 10000,
          mode: el("cfg-mode").value,
        });
      } finally {
        el("btn-save-config").disabled = false;
        el("btn-save-config").textContent = "Save Configuration";
      }
    });

    el("btn-find-db").addEventListener("click", async () => {
      el("btn-find-db").disabled = true;
      try {
        const dbPath = await bridge.resolveDbPath();
        el("db-label").textContent = dbPath || "Not found";
      } finally {
        el("btn-find-db").disabled = false;
      }
    });

    el("btn-poll").addEventListener("click", async () => {
      el("btn-poll").disabled = true;
      try {
        await bridge.pollNow();
      } finally {
        el("btn-poll").disabled = false;
      }
    });

    el("btn-manual-push").addEventListener("click", async () => {
      const title = el("manual-title").value.trim();
      const artist = el("manual-artist").value.trim();
      if (!title) return;
      el("btn-manual-push").disabled = true;
      el("manual-error").style.display = "none";
      try {
        await bridge.manualPush(title, artist);
        el("manual-title").value = "";
        el("manual-artist").value = "";
      } catch (err) {
        el("manual-error").style.display = "";
        el("manual-error").textContent = err.message || "Push failed";
      } finally {
        el("btn-manual-push").disabled = false;
      }
    });

    el("chk-launch-login").addEventListener("change", async () => {
      await bridge.toggleLaunchAtLogin();
    });

    el("link-logs").addEventListener("click", async (e) => {
      e.preventDefault();
      await bridge.openLogs();
    });

    loadConfig();
    loadStatus();
  </script>
</body>
</html>
